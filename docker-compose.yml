services:
  app:
    build: .
    container_name: saveit-app
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - DOCKER_ENV=true
      - PORT=5000
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: saveit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
